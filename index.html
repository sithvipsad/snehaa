<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Be My Valentine? 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="valentine">
        <img src="https://media.giphy.com/media/3o7abB06u9bNzA8LC8/giphy.gif" class="gif" id="gif" alt="Cute waving">
        <div class="question">Will you be my Valentine? 💖</div>
        <div class="message" id="message"></div>
        <div class="buttons">
            <button class="button" id="yes">YES 💕</button>
            <button class="button" id="no">NO 💔</button>
        </div>
    </div>
    <div id="heart-container"></div>
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
